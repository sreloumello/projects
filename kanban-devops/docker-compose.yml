services:

  floci:
    image: floci/floci:latest
    container_name: kanban-floci
    ports:
      - "4566:4566"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FLOCI_STORAGE_MODE=persistent
      - FLOCI_HOSTNAME=floci
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_floci/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: kanban-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    environment:
      - ENV=dev
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
      - COGNITO_REGION=us-east-1
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - ALLOWED_ORIGIN=http://localhost:5173
    depends_on:
      floci:
        condition: service_healthy
    restart: on-failure

  ansible:
    image: python:3.12-slim
    container_name: kanban-ansible
    working_dir: /ansible
    volumes:
      - ./ansible:/ansible
    entrypoint: bash
    command:
      - -c
      - |
        pip install ansible psycopg2-binary --quiet &&
        ansible-galaxy collection install community.postgresql -p /ansible/collections &&
        ansible-playbook -i inventory/local.yml playbook.yml -v
    depends_on:
      floci:
        condition: service_healthy
    profiles:
      - db-setup
